{% macro profile_drawer() %}
<div id="profileDrawer" class="profile-drawer" style="display:none;">
    <div class="profile-drawer-overlay" onclick="closeProfileDrawer()"></div>
    <div class="profile-drawer-content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0" id="drawerName">Loading...</h5>
            <button class="btn btn-sm btn-light" onclick="closeProfileDrawer()"><i class="fas fa-times"></i></button>
        </div>
        <div id="drawerBody">
            <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
        </div>
    </div>
</div>
{% endmacro %}
