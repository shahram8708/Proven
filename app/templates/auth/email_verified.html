{% extends "base.html" %}
{% block title %}Email Verified{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="mb-4">
                <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
            </div>
            <h2 class="fw-bold" style="color: var(--proven-navy);">Email Verified!</h2>
            <p class="text-muted mb-4">Your email address has been confirmed. You can now access all features of Proven.</p>
            <a href="{{ url_for('auth.login') }}" class="btn btn-proven-primary">Log In to Your Account</a>
        </div>
    </div>
</div>
{% endblock %}
