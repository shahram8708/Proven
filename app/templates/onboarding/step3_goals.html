{% extends "base.html" %}
{% block title %}Your Goals — Step 3{% endblock %}
{% block content %}
<section class="py-5 bg-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="text-center mb-4">
                    <div class="d-flex justify-content-center gap-2 mb-3">
                        <span class="badge bg-success rounded-pill px-3 py-2"><i class="fas fa-check"></i></span>
                        <span class="badge bg-success rounded-pill px-3 py-2"><i class="fas fa-check"></i></span>
                        <span class="badge bg-primary rounded-pill px-3 py-2">3</span>
                    </div>
                    <h2 class="fw-bold" style="color: var(--proven-navy);">What are you looking for?</h2>
                    <p class="text-muted">Help us match you with the right opportunities.</p>
                </div>

                <form method="POST" action="{{ url_for('onboarding.onboarding_step3') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">What type of opportunities?</label>
                        <select name="opportunity_type" class="form-select" required>
                            <option value="full_time">Full-time roles</option>
                            <option value="contract">Contract / Freelance</option>
                            <option value="remote">Remote roles</option>
                            <option value="hybrid">Hybrid roles</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Open to opportunities</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="open_to_opportunities" id="open_to_opportunities">
                            <label class="form-check-label" for="open_to_opportunities">Yes, I'm open to relevant roles</label>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('onboarding.onboarding_step2') }}" class="btn btn-outline-secondary">Back</a>
                        <button type="submit" class="btn btn-proven-primary flex-grow-1">Complete Setup</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
